<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Shipwreck City</title>
  <meta name="description" content="Complete archive of all documented shipwrecks in Lake Union, Seattle.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .archive-table { width: 100%; border-collapse: collapse; }
    .archive-table thead tr {
      border-bottom: 1px solid var(--border);
    }
    .archive-table th {
      font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--accent); padding: 12px 16px; text-align: left;
      font-weight: 400;
    }
    .archive-table td {
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      font-size: 18px; color: var(--text-muted); vertical-align: middle;
    }
    .archive-table tr:hover td { background: var(--bg-hover); }
    .archive-table .td-name {
      font-family: var(--font-display); font-size: 27px;
      color: var(--text-primary); letter-spacing: 1px;
    }
    .archive-table a { color: inherit; text-decoration: none; }
    .archive-table a:hover .td-name { color: var(--accent); }
    .td-img { width: 64px; padding: 6px 12px 6px 0; }
    .td-img img { width: 64px; height: 64px; object-fit: cover; display: block; background: var(--bg-deep); }
    .td-tagline { max-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .filter-bar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .filter-btn {
      font-family: var(--font-body); font-size: 13px; letter-spacing: 2px;
      text-transform: uppercase; padding: 9px 24px;
      background: transparent; border: 1px solid var(--border-mid);
      color: var(--text-faint); cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent); color: var(--accent);
    }
  </style>
</head>
<body>

<div id="nav-mount"></div>

<div class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <div class="hero-eyebrow">Complete record</div>
    <h1 class="page-title">WRECK<br>ARCHIVE</h1>
    <p class="page-sub">All documented wrecks, sorted by catalog number. Filter by status or vessel type.</p>
  </div>
</div>

<section class="section container" style="max-width:1750px;">
  <div class="filter-bar" id="filter-bar"></div>
  <div class="section-label" id="archive-count"></div>
  <table class="archive-table" id="archive-table">
    <thead>
      <tr>
        <th style="width:64px;"></th>
        <th style="width:160px;">Catalog</th>
        <th>Name</th>
        <th>Type</th>
        <th style="width:125px;">Depth</th>
        <th>Description</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="archive-body"></tbody>
  </table>
</section>

<div id="footer-mount"></div>

<script src="/js/wrecks-data.js"></script>
<script src="/js/site.js"></script>
<script>
  document.getElementById('nav-mount').innerHTML    = buildNav('archive');
  document.getElementById('footer-mount').innerHTML = buildFooter();

  let activeFilter = 'all';

  const PRIMETIME_EXTS = ['jpg','jpeg','png','webp'];
  function tryPrimetimeExt(img, id) {
    const cur  = img.src.split('.').pop();
    const next = PRIMETIME_EXTS[PRIMETIME_EXTS.indexOf(cur) + 1];
    if (next) { img.src = `/img/wrecks/${id}/primetime.${next}`; }
    else       { img.closest('.td-img').style.background = 'var(--bg-deep)'; img.style.display = 'none'; }
  }

  function renderTable(filter) {
    const filtered = filter === 'all' ? WRECKS : WRECKS.filter(w => w.status === filter || w.type === filter);
    document.getElementById('archive-count').textContent = `${filtered.length} wreck${filtered.length !== 1 ? 's' : ''} — Lake Union`;
    document.getElementById('archive-body').innerHTML = filtered.map(w => `
      <tr>
        <td class="td-img">
          <img src="/img/wrecks/${w.id}/primetime.jpg" alt="${w.name}"
               onerror="tryPrimetimeExt(this,'${w.id}')">
        </td>
        <td><a href="/wrecks/${w.id}.html">${w.catalog}</a></td>
        <td><a href="/wrecks/${w.id}.html"><span class="td-name">${w.name}</span></a></td>
        <td>${w.type}</td>
        <td>${depthDisplay(w.depth)}</td>
        <td class="td-tagline">${w.tagline}</td>
        <td>
          <span class="status-dot status-${w.status}"></span>${statusLabel(w.status)}
        </td>
      </tr>
    `).join('');
  }

  // Build filter buttons from unique statuses
  const statuses = ['all', ...new Set(WRECKS.map(w => w.status))];
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = statuses.map(s => `
    <button class="filter-btn ${s === 'all' ? 'active' : ''}" data-filter="${s}">
      ${s === 'all' ? 'All wrecks' : statusLabel(s)}
    </button>
  `).join('');

  filterBar.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable(btn.dataset.filter);
  });

  renderTable('all');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shipwreck City — Lake Union's Sunken Past</title>
  <meta name="description" content="An underwater archive of Lake Union's shipwrecks. Explore documented wrecks, footage, maps, and field notes from Seattle's hidden depths.">
  <meta property="og:title" content="Shipwreck City">
  <meta property="og:description" content="An interactive museum of Lake Union's sunken vessels.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .index-section-heading {
      font-family: var(--font-display);
      font-size: 42px;
      letter-spacing: 1px;
      color: var(--text-primary);
      text-decoration: none;
      display: block;
      margin-bottom: 24px;
      transition: color 0.15s;
    }
    .index-section-heading:hover { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<div id="nav-mount"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg-photo">
    <img src="img/wrecks/lu009/primetime.png" alt="" aria-hidden="true">
  </div>
  <div class="hero-grid"></div>
  <div class="hero-scan"></div>
  <div class="hero-blip hero-blip-1"></div>
  <div class="hero-blip hero-blip-2"></div>
  <div class="hero-blip hero-blip-3"></div>
  <div class="hero-blip hero-blip-4"></div>
  <div class="hero-blip hero-blip-5"></div>
  <div class="hero-blip hero-blip-6"></div>
  <div class="hero-blip hero-blip-7"></div>
  <div class="hero-content">
    <div class="hero-eyebrow">Lake Union · Seattle · 47°37'N 122°20'W</div>
    <h1 class="hero-title">SHIP<br><em>WRECK</em><br>CITY</h1>
    <p class="hero-sub">Completing the underwater archive of Seattle's sunken maritime history — the vessels lost to time, fire, and the deep.</p>
  </div>
  <div class="hero-meta">
    <div class="hero-meta-label">Depth range</div>
    <div class="hero-meta-val" id="hero-depth">— ft</div>
  </div>
</section>

<!-- STATS -->
<div class="stats-bar" id="stats-bar"></div>

<!-- WRECK GRID -->
<section class="wrecks-scroll-section">
  <div class="wrecks-scroll-wrapper">
    <button class="scroll-arrow scroll-arrow-left" id="scroll-left" aria-label="Scroll left">&#8592;</button>
    <div class="wrecks-scroll-track" id="wrecks-grid"></div>
    <button class="scroll-arrow scroll-arrow-right" id="scroll-right" aria-label="Scroll right">&#8594;</button>
  </div>
</section>

<!-- MAP -->
<section class="map-section">
  <div class="container">
    <a id="map-section-label" class="index-section-heading">Target Map →</a>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4a9eba;"></div> Recently Explored</div>
      <div class="legend-item"><div class="legend-dot" style="background:#5a8a6a;"></div> Previously Explored</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c87941;"></div> Never Explored</div>
    </div>
    <div class="map-wrapper" id="map-wrapper">
      <div id="wreck-map"></div>
      <button class="map-fullscreen-btn" id="map-fullscreen" aria-label="Toggle fullscreen">
        <svg class="icon-expand" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="1,5 1,1 5,1"/><polyline points="11,1 15,1 15,5"/>
          <polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/>
        </svg>
        <svg class="icon-collapse" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
          <polyline points="5,1 1,1 1,5"/><polyline points="11,1 15,1 15,5"/>
          <polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/>
          <polyline points="5,5 1,1"/><polyline points="11,5 15,1"/>
          <polyline points="15,15 11,11"/><polyline points="1,15 5,11"/>
        </svg>
      </button>
    </div>
  </div>
</section>

<!-- FIELD PHOTOS -->
<section class="wrecks-scroll-section">
  <div class="wrecks-scroll-wrapper">
    <button class="scroll-arrow scroll-arrow-left" id="field-scroll-left" aria-label="Scroll left">&#8592;</button>
    <div class="field-scroll-track" id="field-photos-track"></div>
    <button class="scroll-arrow scroll-arrow-right" id="field-scroll-right" aria-label="Scroll right">&#8594;</button>
  </div>
</section>

<!-- SUPPORTERS -->
<section class="supporters-section">
  <div class="container">
    <a id="supporters-section-label" class="index-section-heading">Supporters →</a>
    <div class="supporters-grid" id="supporters-grid"></div>
  </div>
</section>

<div id="footer-mount"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/wrecks-data.js"></script>
<script src="js/photos-data.js"></script>
<script src="js/links-data.js"></script>
<script src="js/site.js"></script>
<script>
  // Supporter logos
  document.getElementById('supporters-grid').innerHTML = SUPPORTERS
    .filter(s => s.logo)
    .map(s => s.url && s.url !== '#'
      ? `<a href="${s.url}" target="_blank" rel="noopener"><img src="${ROOT}/${s.logo}" alt="${s.name}"></a>`
      : `<img src="${ROOT}/${s.logo}" alt="${s.name}">`)
    .join('');

  // Nav & footer
  document.getElementById('nav-mount').innerHTML   = buildNav('home');
  document.getElementById('footer-mount').innerHTML = buildFooter();

  document.getElementById('map-section-label').href       = `${ROOT}/map.html`;
  document.getElementById('supporters-section-label').href = `${ROOT}/support.html`;

  // Stats
  const depths        = WRECKS.map(w => w.depth).filter(Boolean);
  const maxD          = depths.length ? Math.max(...depths) : 0;
  const minD          = depths.length ? Math.min(...depths) : 0;
  const recentCount   = WRECKS.filter(w => w.status === 'recently-explored').length;
  const newTargetCount= WRECKS.filter(w => w.newTarget).length;
  const totalHours    = WRECKS.reduce((sum, w) => sum + (w.diveDuration || 0), 0);
  document.getElementById('hero-depth').textContent = `${minD} — ${maxD} ft`;

  document.getElementById('stats-bar').innerHTML = `
    <a class="stat" href="${ROOT}/archive.html" style="text-decoration:none;cursor:pointer;"><div class="stat-num" style="color:#c87941;">${WRECKS.length}</div><div class="stat-label">Known Lakebed Targets</div></a>
    <a class="stat" href="${ROOT}/archive.html#recently-explored" style="text-decoration:none;cursor:pointer;"><div class="stat-num" style="color:#4a9eba;">${recentCount}</div><div class="stat-label">Recently Explored</div></a>
    <a class="stat" href="${ROOT}/archive.html#newly-uncovered" style="text-decoration:none;cursor:pointer;"><div class="stat-num">${newTargetCount}</div><div class="stat-label">New Wrecks Uncovered</div></a>
    <div class="stat"><div class="stat-num">${totalHours}hr</div><div class="stat-label">Underwater</div></div>
  `;

  //<div class="stat"><div class="stat-num">${WRECKS.filter(w=>w.status==='documented').length}</div><div class="stat-label">Fully identified</div></div>

  // Try each extension in order until one loads (for primetime.* files)
  const PRIMETIME_EXTS = ['jpg','jpeg','png','webp'];
  function tryPrimetimeExt(img, id) {
    const cur  = img.src.split('.').pop();
    const next = PRIMETIME_EXTS[PRIMETIME_EXTS.indexOf(cur) + 1];
    if (next) { img.src = `${ROOT}/img/wrecks/${id}/primetime.${next}`; }
    else       { img.style.display = 'none'; }
  }

  // Wreck grid — only wrecks that have photos
  const grid = document.getElementById('wrecks-grid');
  grid.innerHTML = WRECKS.filter(w => w.hasPrimetime || w.images.length > 0).map(w => `
    <a class="wreck-card" href="${ROOT}/wrecks/${w.id}.html">
      <div class="wreck-card-num">${w.catalog}</div>
      <div class="wreck-card-name">${w.name}</div>
      <div class="wreck-card-meta">
        <span class="status-dot status-${w.status}"></span>${statusLabel(w.status)} · ${yearDisplay(w)} · ${depthDisplay(w.depth)}<br>
        ${w.location}
      </div>
      <div class="wreck-card-tagline">${w.tagline}</div>
      <div class="wreck-type-badge">${w.type}</div>
    </a>
    <a class="wreck-photo-tile" href="${ROOT}/wrecks/${w.id}.html">
      <img src="${ROOT}/img/wrecks/${w.id}/primetime.jpg" alt="${w.name}"
           onload="this.nextElementSibling.style.display='none'"
           onerror="tryPrimetimeExt(this,'${w.id}')">
      <div class="wreck-photo-fallback">
        <span>${w.catalog}</span>
        <span>No image</span>
      </div>
    </a>
  `).join('');

  // Map
  const map = L.map('wreck-map', {
    center: SITE_CONFIG.coordinates,
    zoom:   SITE_CONFIG.mapZoom,
    zoomControl: true
  });

  const tiles = makeTileLayers(L);
  tiles.satellite.addTo(map);
  applyTileFilter(map, 'Satellite');
  addTileToggle(L, map, tiles, 'Satellite');

  WRECKS.forEach(w => {
    if (!w.coordinates) return;
    L.marker(w.coordinates, { icon: makeMarker(L, w) })
      .addTo(map)
      .bindPopup(makePopup(w), { maxWidth: 440 });
  });

  // Map fullscreen toggle
  const mapWrapper  = document.getElementById('map-wrapper');
  const fsBtn       = document.getElementById('map-fullscreen');
  const iconExpand  = fsBtn.querySelector('.icon-expand');
  const iconCollapse= fsBtn.querySelector('.icon-collapse');

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      mapWrapper.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  });
  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    iconExpand.style.display   = isFs ? 'none' : '';
    iconCollapse.style.display = isFs ? ''     : 'none';
    const mapEl = document.getElementById('wreck-map');
    mapEl.style.height = isFs ? window.innerHeight + 'px' : '';
    setTimeout(() => map.invalidateSize(), 50);
  });

  // Scroll arrows
  const track      = document.getElementById('wrecks-grid');
  const btnLeft    = document.getElementById('scroll-left');
  const btnRight   = document.getElementById('scroll-right');
  const wreckScrollSection = track.closest('section');
  const CARD_STEP  = 385; // card width + 1px gap

  function syncArrows() {
    btnLeft.disabled  = track.scrollLeft <= 0;
    btnRight.disabled = track.scrollLeft >= track.scrollWidth - track.clientWidth - 1;
  }
  const GROUP_STEP = CARD_STEP * 4; // 2 wreck cards + 2 photo tiles
  let autoTimer = null;
  function autoStep() {
    const atEnd = track.scrollLeft >= track.scrollWidth - track.clientWidth - 1;
    track.scrollBy({ left: atEnd ? -track.scrollWidth : GROUP_STEP, behavior: 'smooth' });
  }
  function startAuto() { if (!autoTimer) autoTimer = setInterval(autoStep, 6000); }
  function stopAuto()  { clearInterval(autoTimer); autoTimer = null; }

  startAuto();
  wreckScrollSection.addEventListener('mouseenter', stopAuto);
  wreckScrollSection.addEventListener('mouseleave', startAuto);

  btnLeft.addEventListener('click',  () => track.scrollBy({ left: -GROUP_STEP, behavior: 'smooth' }));
  btnRight.addEventListener('click', () => track.scrollBy({ left:  GROUP_STEP, behavior: 'smooth' }));
  track.addEventListener('scroll', syncArrows);
  syncArrows();

  // Field photos strip
  const FIELD_PHOTOS = FIELDWORK_PHOTOS;
  const PHOTO_STEP = 481 * 4; // 4 tiles at a time
  const fieldTrack   = document.getElementById('field-photos-track');
  const fieldLeft    = document.getElementById('field-scroll-left');
  const fieldRight   = document.getElementById('field-scroll-right');
  const fieldSection = fieldTrack.closest('section');

  fieldTrack.innerHTML = FIELD_PHOTOS.map(f => `
    <div class="field-photo-tile">
      <img src="${ROOT}/img/main-fieldwork/${f}" alt="Field — ${f}" loading="lazy">
    </div>
  `).join('');

  function syncFieldArrows() {
    fieldLeft.disabled  = fieldTrack.scrollLeft <= 0;
    fieldRight.disabled = fieldTrack.scrollLeft >= fieldTrack.scrollWidth - fieldTrack.clientWidth - 1;
  }

  let fieldAutoTimer = null;
  function fieldAutoStep() {
    const atEnd = fieldTrack.scrollLeft >= fieldTrack.scrollWidth - fieldTrack.clientWidth - 1;
    fieldTrack.scrollBy({ left: atEnd ? -fieldTrack.scrollWidth : PHOTO_STEP, behavior: 'smooth' });
  }
  function startFieldAuto() { if (!fieldAutoTimer) fieldAutoTimer = setInterval(fieldAutoStep, 6000); }
  function stopFieldAuto()  { clearInterval(fieldAutoTimer); fieldAutoTimer = null; }

  startFieldAuto();
  fieldSection.addEventListener('mouseenter', stopFieldAuto);
  fieldSection.addEventListener('mouseleave', startFieldAuto);

  fieldLeft.addEventListener('click',  () => fieldTrack.scrollBy({ left: -PHOTO_STEP, behavior: 'smooth' }));
  fieldRight.addEventListener('click', () => fieldTrack.scrollBy({ left:  PHOTO_STEP, behavior: 'smooth' }));
  fieldTrack.addEventListener('scroll', syncFieldArrows);
  syncFieldArrows();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wreck Map — Shipwreck City</title>
  <meta name="description" content="Interactive map of all documented shipwrecks in Lake Union, Seattle.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    .map-sidebar {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 300px; background: rgba(10,14,20,0.92);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      z-index: 500;
      padding: 24px;
    }
    .map-wrap { position: relative; }
    /* legend styles are in shared style.css */
  </style>
</head>
<body>

<div id="nav-mount"></div>

<div class="page-hero">
  <div class="page-hero-grid"></div>
  <div class="page-hero-content">
    <div class="hero-eyebrow">Lake Union · Seattle</div>
    <h1 class="page-title">WRECK<br>MAP</h1>
    <p class="page-sub">All documented wrecks plotted by GPS coordinates. Click any marker to view the record.</p>
  </div>
</div>

<div class="container">
  <div class="map-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4a9eba;"></div> Recently Explored</div>
    <div class="legend-item"><div class="legend-dot" style="background:#5a8a6a;"></div> Previously Explored</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c87941;"></div> Never Explored</div>
  </div>
</div>

<div class="map-wrap container" style="position:relative;">
  <div class="map-wrapper" id="map-wrapper">
    <div id="full-map"></div>
    <button class="map-fullscreen-btn" id="map-fullscreen" aria-label="Toggle fullscreen">
      <svg class="icon-expand" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="1,5 1,1 5,1"/><polyline points="11,1 15,1 15,5"/>
        <polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/>
      </svg>
      <svg class="icon-collapse" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
        <polyline points="5,1 1,1 1,5"/><polyline points="11,1 15,1 15,5"/>
        <polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/>
        <polyline points="5,5 1,1"/><polyline points="11,5 15,1"/>
        <polyline points="15,15 11,11"/><polyline points="1,15 5,11"/>
      </svg>
    </button>
  </div>
</div>

<div id="footer-mount"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/wrecks-data.js"></script>
<script src="js/site.js"></script>
<script>
  document.getElementById('nav-mount').innerHTML    = buildNav('map');
  document.getElementById('footer-mount').innerHTML = buildFooter();

  const map = L.map('full-map', {
    center: SITE_CONFIG.coordinates,
    zoom: SITE_CONFIG.mapZoom + 1
  });

  const tiles = makeTileLayers(L);
  tiles.dark.addTo(map);
  applyTileFilter(map, 'Dark');
  L.control.layers({ 'Dark': tiles.dark, 'Satellite': tiles.satellite }, {}, { position: 'topright' }).addTo(map);
  map.on('baselayerchange', e => applyTileFilter(map, e.name));

  WRECKS.forEach(w => {
    if (!w.coordinates) return;
    L.marker(w.coordinates, { icon: makeMarker(L, w) })
      .addTo(map)
      .bindPopup(makePopup(w), { maxWidth: 440 });
  });

  // Fullscreen toggle
  const mapWrapper   = document.getElementById('map-wrapper');
  const fsBtn        = document.getElementById('map-fullscreen');
  const iconExpand   = fsBtn.querySelector('.icon-expand');
  const iconCollapse = fsBtn.querySelector('.icon-collapse');

  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) { mapWrapper.requestFullscreen(); }
    else                             { document.exitFullscreen(); }
  });
  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    iconExpand.style.display   = isFs ? 'none' : '';
    iconCollapse.style.display = isFs ? ''     : 'none';
    const mapEl = document.getElementById('full-map');
    mapEl.style.height = isFs ? window.innerHeight + 'px' : '';
    setTimeout(() => map.invalidateSize(), 50);
  });
</script>
</body>
</html>
